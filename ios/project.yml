name: NamazVakti
options:
  bundleIdPrefix: com.oktay
  minimumXcodeGenVersion: 2.28.0

packages:
  Adhan:
    url: https://github.com/batoulapps/Adhan-Swift
    from: 1.2.0

settings:
  base:
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""

targets:
  NamazVakti:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: NamazVakti/NamazVakti
    settings:
      base:
        INFOPLIST_FILE: NamazVakti/NamazVakti/Info.plist
        CODE_SIGN_ENTITLEMENTS: NamazVakti/NamazVakti/NamazVakti.entitlements
    dependencies:
      - package: Adhan
      - target: NamazVaktiWidget

  NamazVaktiWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: NamazVaktiWidget
      - path: NamazVakti/NamazVakti/Models/LocationData.swift
      - path: NamazVakti/NamazVakti/Services/PrayerCalculator.swift
    settings:
      base:
        INFOPLIST_FILE: NamazVaktiWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: NamazVaktiWidget/NamazVaktiWidget.entitlements
        # Extension bundle ids must be prefixed by the host app's bundle id
        PRODUCT_BUNDLE_IDENTIFIER: com.oktay.NamazVakti.NamazVaktiWidget
    dependencies:
      - package: Adhan
